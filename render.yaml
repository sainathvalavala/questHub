services:
  - type: web
    name: questhub-backend
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromDatabase:
          name: questhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        value: mock
      - key: CLOUDINARY_API_KEY
        value: mock
      - key: CLOUDINARY_API_SECRET
        value: mock
